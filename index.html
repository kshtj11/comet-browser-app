<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Browser Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Roboto+Mono:wght@400&family=Inter:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #070707;
    --surface: #161616;
    --surface-2: #212121;
    --surface-3: #2c2c2c;
    --text: #eaeaea;
    --dim: #888888;
    --line: #2c2c2c;
    --accent: #cacaca;   /* neutral grayscale, R=G=B */
    --radius: 22px;
    --tap: 44px;
    --page-font: 16px;
  }

  * {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none; user-select: none;
    font-family: "Sora", -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }

  .frame { font-size: 16px; }   /* standard size */

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    overscroll-behavior: none;
  }
  body { display: flex; align-items: center; justify-content: center; }

  /* ---- Android-style edge back-swipe affordance ---- */
  .backhint {
    position: absolute; left: 0; top: 0;
    width: 44px; height: 58px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(38,38,38,.94);
    border: 1px solid #3a3a3a; border-left: none;
    border-radius: 0 32px 32px 0;
    color: #eaeaea;
    opacity: 0; pointer-events: none;
    z-index: 70;
    box-shadow: 0 6px 22px rgba(0,0,0,.55);
    will-change: left, right, top, opacity;
  }
  .backhint.right {
    left: auto; right: 0;
    border: 1px solid #3a3a3a; border-right: none;
    border-radius: 32px 0 0 32px;
  }
  .backhint .arrow { transition: transform .08s; }
  .backhint.right .arrow { transform: rotate(180deg); }
  .backhint.committed { background: rgba(72,72,72,.96); }
  .backhint.committed .arrow { transform: scale(1.18); }
  .backhint.right.committed .arrow { transform: rotate(180deg) scale(1.18); }

  .frame {
    position: relative;
    width: 540px; height: 620px;
    background: var(--bg);
    overflow: hidden;
    touch-action: none;
    color: var(--text);
  }

  /* ---- High-contrast + big-target modifiers ---- */
  .frame.hc {
    --bg: #000; --surface: #1d1d1d; --surface-2: #2a2a2a; --surface-3: #3c3c3c;
    --text: #ffffff; --dim: #c6c6c6; --line: #494949; --accent: #e7e7e7;
  }
  .frame.big { --tap: 56px; }

  /* ===== Screens ===== */
  .screen { position: absolute; inset: 0; }

  /* ---- Web view (base) ---- */
  .page {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    overflow-y: auto; touch-action: pan-y;
    padding: 26px 22px 120px;          /* clearance so content clears the floating bar */
  }
  .page::-webkit-scrollbar { display: none; }
  .page h1 { font-size: 30px; font-weight: 700; margin-bottom: 6px; }
  .page .u { color: var(--dim); font-size: 14px; margin-bottom: 24px; word-break: break-all; }
  .page p { color: var(--dim); font-size: var(--page-font); line-height: 1.55; margin-bottom: 14px; }
  .result {
    background: var(--surface); border-radius: 16px;
    padding: 14px 16px; margin-bottom: 12px;
  }
  .result .rt { font-size: var(--page-font); margin-bottom: 4px; }
  .result .ru { color: var(--accent); font-size: 14px; }
  .blank {
    height: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center; color: var(--line);
  }
  .blank .mark { font-size: 22px; letter-spacing: 4px; color: var(--dim); opacity: .5; }

  /* ---- Home / new-tab page: centered top sites ---- */
  .ddg {
    min-height: 100%; display: flex; align-items: center; justify-content: center;
    padding-bottom: 60px;   /* optical centering above the floating bar */
  }
  .ddg .tops { display: flex; gap: 26px; justify-content: center; }
  .ddg .top {
    display: flex; flex-direction: column; align-items: center; gap: 9px;
    width: 76px; cursor: pointer;
  }
  .ddg .top:active { transform: scale(.94); }
  .ddg .top .ico {
    width: 64px; height: 64px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 23px;
  }
  .ddg .top .nm { font-size: 13px; color: var(--dim); }

  /* ---- Fake webpage ---- */
  .site { margin: -4px 0 0; }
  .site .brandbar {
    display: flex; align-items: center; gap: 10px;
    padding-bottom: 16px; margin-bottom: 18px;
    border-bottom: 1px solid var(--line);
  }
  .site .brandbar .logo {
    width: 30px; height: 30px; border-radius: 8px;
    background: linear-gradient(135deg, #3a3a3a, #1f1f1f);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 15px; color: var(--text);
  }
  .site .brandbar .name { font-weight: 600; font-size: 15px; }
  .site .brandbar .nav { margin-left: auto; color: var(--dim); font-size: 13px; }
  .site h1 { font-size: 27px; line-height: 1.2; margin-bottom: 10px; }
  .site .meta { color: var(--dim); font-size: 13px; margin-bottom: 18px; }
  .site .hero {
    height: 180px; border-radius: 14px; margin-bottom: 20px;
    background: linear-gradient(135deg, #2a2a2a 0%, #161616 60%, #242424 100%);
    position: relative; overflow: hidden;
  }
  .site .hero::after {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(circle at 70% 30%, rgba(255,255,255,.05), transparent 60%);
  }
  .site h2 { font-size: 19px; margin: 22px 0 10px; }
  .site p { color: #b5b5b5; font-size: var(--page-font); line-height: 1.62; margin-bottom: 14px; }
  .site blockquote {
    border-left: 3px solid var(--surface-3); margin: 18px 0;
    padding: 4px 0 4px 16px; color: var(--text); font-style: italic; font-size: 17px;
  }
  .site ul { margin: 0 0 16px 20px; }
  .site li { color: #b5b5b5; font-size: var(--page-font); line-height: 1.6; margin-bottom: 8px; }
  .site .imgrow { display: flex; gap: 12px; margin: 4px 0 20px; }
  .site .imrow .cell, .site .imgrow .cell { flex: 1; }
  .site .imgrow {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 4px 0 20px;
  }
  .site .imgrow .cell {
    height: 96px; border-radius: 12px;
    background: linear-gradient(135deg, #262626, #171717);
  }
  .site .tag {
    display: inline-block; background: var(--surface-2); border: 1px solid var(--line);
    color: var(--dim); font-size: 12px; padding: 5px 10px; border-radius: 20px; margin: 0 6px 8px 0;
  }
  .site .foot {
    margin-top: 26px; padding-top: 16px; border-top: 1px solid var(--line);
    color: var(--dim); font-size: 12px;
  }
  .site a { color: #7fb0ff; text-decoration: underline; text-underline-offset: 2px; cursor: pointer; }
  .site a:active { opacity: .6; }
  .site .linklist { display: flex; flex-direction: column; gap: 12px; margin: 4px 0 6px; }
  .site .linklist a { font-size: var(--page-font); text-decoration: none; }

  /* ---- Light-mode webpage ---- */
  .page.light { background: #f4f4f5; }
  .page.light .site .brandbar { border-bottom-color: #e3e3e6; }
  .page.light .site .brandbar .logo {
    background: linear-gradient(135deg, #e9e9ec, #cfcfd4); color: #1a1a1a;
  }
  .page.light .site .brandbar .name { color: #1a1a1a; }
  .page.light .site .brandbar .nav,
  .page.light .site .meta,
  .page.light .site .foot { color: #7a7a80; }
  .page.light .site h1,
  .page.light .site h2 { color: #14141a; }
  .page.light .site p,
  .page.light .site li { color: #45454c; }
  .page.light .site .hero {
    background: linear-gradient(135deg, #dadade 0%, #ececef 60%, #cfcfd6 100%);
  }
  .page.light .site .hero::after {
    background: radial-gradient(circle at 70% 30%, rgba(0,0,0,.04), transparent 60%);
  }
  .page.light .site .imgrow .cell {
    background: linear-gradient(135deg, #e2e2e6, #d2d2d8);
  }
  .page.light .site blockquote { border-left-color: #c8c8ce; color: #1c1c22; }
  .page.light .site .tag { background: #ececef; border-color: #dcdce0; color: #6a6a70; }
  .page.light .site .foot { border-top-color: #e3e3e6; }
  .page.light .site a { color: #1a5fd0; }

  /* ---- Bottom bar ---- */
  .bottombar {
    position: absolute; left: 0; right: 0; bottom: 0;
    height: 100px; padding: 10px 24px 30px;
    display: flex; align-items: center; gap: 8px;
    background: var(--bg);
    transition: transform .26s cubic-bezier(.4,0,.2,1), bottom .25s cubic-bezier(.4,0,.2,1), height .25s, padding .25s;
  }
  .bottombar.hidden { transform: translateY(105%); }
  /* when the on-screen keyboard is up, the bar rides on top of it,
     tightens its bottom padding, and the address bar takes the whole row */
  .frame.kbd-open .bottombar { bottom: 240px; height: 80px; padding-bottom: 10px; }
  .frame.kbd-open .bottombar .iconbtn { display: none; }

  .addr-clear {
    flex: 0 0 auto; display: none;
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--surface-3); border: none; color: var(--text);
    align-items: center; justify-content: center; cursor: pointer;
    -webkit-appearance: none; appearance: none; padding: 0;
  }
  .addr-clear svg { width: 16px; height: 16px; }
  .frame.kbd-open .addr-clear { display: flex; }

  /* ---- On-screen keyboard (system) ---- */
  .kbd {
    position: absolute; left: 0; right: 0; bottom: 0; height: 240px;
    background: #000; z-index: 80;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    padding-top: 10px;
    transform: translateY(100%);
    transition: transform .25s cubic-bezier(.4,0,.2,1);
    touch-action: none;
  }
  .frame.kbd-open .kbd { transform: translateY(0); }
  .kbd .krow { display: flex; gap: 8px; }
  .kbd .key {
    -webkit-appearance: none; appearance: none;
    border: none; outline: none; box-shadow: none; margin: 0; padding: 0;
    width: 42px; height: 48px; border-radius: 8px;
    background: #3A3A3A; color: #DDDDDD;
    font-family: 'Roboto Mono', monospace; font-size: 28px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; user-select: none;
  }
  .kbd .key:active { background: #5a5a5a; }
  .kbd .key.shift { width: 81px; background: #636363; font-family: 'Inter', sans-serif; font-size: 24px; }
  .kbd .key.back  { width: 81px; background: #474747; font-family: 'Inter', sans-serif; font-size: 24px; }
  .kbd .key.sym   { width: 64px; background: #2D2D2D; font-size: 20px; }
  .kbd .key.fn    { width: 40px; background: #2D2D2D; font-size: 18px; }
  .kbd .key.comma { width: 40px; background: #2D2D2D; font-size: 24px; }
  .kbd .key.space { width: 222px; background: #474747; }
  .kbd .key.dot   { width: 44px; background: #2D2D2D; font-size: 24px; }
  .kbd .key.enter { width: 70px; background: #636363; font-family: 'Inter', sans-serif; font-size: 22px; }
  .kbd.shift-on .key.shift { background: #8a8a8a; color: #fff; }
  .addr {
    flex: 1; min-width: 0; height: 60px;
    background: var(--surface-2); border-radius: 30px;
    border: 1px solid var(--line);
    display: flex; align-items: center; gap: 8px;
    padding: 0 18px;
  }
  .addr svg { flex: 0 0 auto; }
  .addr input {
    flex: 1; min-width: 0; background: transparent; border: none; outline: none;
    color: var(--text); font-size: 16px;
  }
  .addr input::placeholder { color: var(--dim); }

  .iconbtn {
    flex: 0 0 auto;
    width: var(--tap); height: var(--tap);
    border-radius: 50%;
    background: transparent; border: none;
    display: flex; align-items: center; justify-content: center;
    color: var(--text); cursor: pointer;
    transition: background .12s, transform .08s;
  }
  .iconbtn:active { background: var(--surface-2); transform: scale(.9); }

  .tabsbtn {
    position: relative;
    width: 26px; height: 26px;
    border: 2px solid var(--text); border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  /* bottom-bar icons scaled up to match the 60px address bar */
  .bottombar .iconbtn { width: 52px; height: 52px; }
  .bottombar .iconbtn svg { width: 27px; height: 27px; }
  .bottombar .tabsbtn { width: 30px; height: 30px; font-size: 15px; }

  /* ---- Tabs page (slides up) ---- */
  .sheet {
    z-index: 20;
    background: #181818;          /* lighter than the base so it floats on top */
    transform: translateY(100%);
    transition: transform .28s cubic-bezier(.4,0,.2,1);
    display: flex; flex-direction: column;
  }
  .sheet.open { transform: translateY(0); }
  .sheet .grab { padding: 10px 0 4px; display: flex; justify-content: center; touch-action: none; }
  .sheet .grab i { width: 38px; height: 5px; border-radius: 3px; background: var(--surface-3); }
  .sheet .head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 20px 24px;
  }
  .sheet .head h2 { font-size: 18px; }
  .tabgrid {
    flex: 1; overflow-y: auto; touch-action: pan-y;
    -webkit-overflow-scrolling: touch;
    padding: 0 16px 24px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
    grid-auto-rows: max-content;   /* don't stretch/shrink rows to fit */
    align-content: start;
  }
  .tabgrid::-webkit-scrollbar { display: none; }
  .tabcard {
    background: var(--surface); border-radius: 16px;
    overflow: hidden; cursor: pointer; position: relative;
    display: flex; flex-direction: column;
    border: 2px solid transparent;
    transition: transform .08s;
  }
  .tabcard:active { transform: scale(.96); }
  .tabcard.active { border-color: var(--accent); }
  .tabcard .prev {
    flex: 0 0 auto;            /* fixed, never shrink */
    height: 284px;            /* 247w : 284h ≈ Comet 540:620 ratio */
    display: flex; align-items: center; justify-content: center;
    font-size: 34px; font-weight: 700; color: var(--text);
  }
  .tabcard .meta {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 6px 6px 12px; background: var(--surface-2);
    min-height: var(--tap);
  }
  .tabcard .meta span {
    flex: 1; font-size: 14px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .tabcard .x {
    flex: 0 0 auto; position: relative;
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--surface-3); color: var(--text); border: none;
    font-size: 20px; line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  /* invisible 44px hit area around the smaller visible circle */
  .tabcard .x::before { content: ""; position: absolute; inset: -6px; }
  .newtab {
    border: 2px dashed var(--line); border-radius: 16px;
    background: transparent; color: var(--dim);
    height: 328px; display: flex; align-items: center; justify-content: center;
    font-size: 30px; cursor: pointer;
  }

  /* ---- Settings menu (scales from bottom-right) ---- */
  .scrim {
    position: absolute; inset: 0; z-index: 30;
    background: rgba(0,0,0,.45);
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .scrim.open { opacity: 1; pointer-events: auto; }

  .menu {
    position: absolute; z-index: 40;
    right: 12px; bottom: 84px;
    width: 60%; max-width: 330px;
    background: #242424;          /* lighter so it floats above the base */
    border-radius: 20px;
    border: 1px solid #333333;
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
    overflow: hidden;
    padding-top: 8px;             /* breathing room above first item */
    transform-origin: bottom right;
    transform: scale(.05); opacity: 0;
    transition: transform .22s cubic-bezier(.34,1.2,.5,1), opacity .18s;
    pointer-events: none;
  }
  .menu.open { transform: scale(1); opacity: 1; pointer-events: auto; }
  .menu .item {
    display: flex; align-items: center; gap: 14px;
    padding: 0 18px; height: var(--tap);
    cursor: pointer; color: var(--text); font-size: 16px;
    transition: background .12s;
  }
  .menu .item:active { background: #2e2e2e; }
  .menu .item svg { flex: 0 0 auto; color: var(--dim); }
  .menu .row {
    display: flex; align-items: center; justify-content: space-around;
    padding: 6px 14px; margin-top: 8px;
    border-top: 1px solid #333333;
    background: #1c1c1c;
  }
  .menu .row button {
    -webkit-appearance: none; appearance: none;
    border: none; outline: none; box-shadow: none; padding: 0;
    width: 52px; height: 52px; border-radius: 8px;
    background: #333333; color: var(--text);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: transform .08s, background .12s;
  }
  .menu .row button:active { transform: scale(.9); }
  .menu .row button:disabled { opacity: .35; }
  .menu .row button.on { background: var(--accent); color: #161616; }

  /* ---- Sub panels (slide in from right) ---- */
  .panel {
    z-index: 50; background: var(--bg);
    transform: translateX(100%);
    transition: transform .26s cubic-bezier(.4,0,.2,1);
    display: flex; flex-direction: column;
  }
  .panel.open { transform: translateX(0); }
  .panel .phead {
    display: flex; align-items: center; gap: 10px;
    padding: 16px 16px 12px; border-bottom: 1px solid var(--line);
  }
  .panel .phead h2 { font-size: 18px; flex: 1; }
  .panel .phead .act {
    background: none; border: none; color: var(--accent); cursor: pointer;
    display: flex; align-items: center; gap: 4px; font-size: 16px;
    min-height: var(--tap); min-width: var(--tap); padding: 0 6px;
  }
  .panel .body { flex: 1; overflow-y: auto; touch-action: pan-y; padding: 8px 0 24px; }
  .panel .body::-webkit-scrollbar { display: none; }

  .listrow {
    display: flex; align-items: center; gap: 12px;
    padding: 0 18px; min-height: var(--tap); cursor: pointer;
  }
  .listrow:active { background: var(--surface); }
  .listrow .ico {
    flex: 0 0 auto; width: 34px; height: 34px; border-radius: 9px;
    background: var(--surface-2); display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
  }
  .listrow .txt { flex: 1; min-width: 0; padding: 8px 0; }
  .listrow .txt .t { font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .listrow .txt .s { font-size: 14px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .listrow .rm {
    flex: 0 0 auto; background: none; border: none; color: var(--dim);
    font-size: 24px; cursor: pointer;
    width: var(--tap); height: var(--tap);
    display: flex; align-items: center; justify-content: center;
  }
  .empty { color: var(--dim); text-align: center; padding: 50px 20px; font-size: 14px; }

  /* Accessibility controls */
  .actrl { padding: 18px; }
  .actrl .lbl { font-size: 14px; color: var(--dim); margin: 18px 0 10px; }
  .seg {
    display: flex; background: var(--surface); border-radius: 12px; padding: 4px; gap: 4px;
  }
  .seg button {
    flex: 1; border: none; background: transparent; color: var(--text);
    min-height: var(--tap); border-radius: 9px; cursor: pointer; font-size: 16px;
  }
  .seg button.on { background: var(--surface-3); color: var(--text); }
  .toggle {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
    cursor: pointer;
  }
  .toggle .tl { font-size: 14px; }
  .sw { width: 48px; height: 28px; border-radius: 15px; background: var(--surface-3); position: relative; transition: background .15s; }
  .sw::after { content:""; position: absolute; top: 3px; left: 3px; width: 22px; height: 22px; border-radius: 50%; background: #fff; transition: left .15s; }
  .toggle.on .sw { background: #5e5e5e; }
  .toggle.on .sw::after { left: 23px; }
</style>
</head>
<body>
  <div class="frame" id="frame">

    <!-- ================= WEB VIEW ================= -->
    <div class="screen" id="webview">
      <div class="page" id="page"></div>

      <div class="bottombar">
        <form class="addr" id="addrForm">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--dim)">
            <rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/>
          </svg>
          <input id="addrInput" type="text" placeholder="Search or enter address" autocomplete="off" spellcheck="false" enterkeyhint="go">
          <button type="button" class="addr-clear" id="addrClear" aria-label="Clear text">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
          </button>
        </form>

        <button class="iconbtn" id="plusBtn" title="New tab" aria-label="New tab">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>

        <button class="iconbtn" id="tabsBtn" title="Tabs" aria-label="Tabs">
          <span class="tabsbtn" id="tabCount">1</span>
        </button>

        <button class="iconbtn" id="menuBtn" title="Menu" aria-label="Menu">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
        </button>
      </div>
    </div>

    <!-- ================= TABS PAGE ================= -->
    <div class="screen sheet" id="tabsSheet">
      <div class="grab" id="tabsGrab"><i></i></div>
      <div class="head">
        <h2>Tabs</h2>
      </div>
      <div class="tabgrid" id="tabGrid"></div>
    </div>

    <!-- ================= SETTINGS MENU ================= -->
    <div class="scrim" id="scrim"></div>
    <div class="menu" id="menu">
      <div class="item" data-act="newtab">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New tab
      </div>
      <div class="item" data-act="history">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
        History
      </div>
      <div class="item" data-act="bookmarks">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M6 4h12v16l-6-4-6 4z"/></svg>
        Bookmarks
      </div>
      <div class="item" data-act="downloads">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M7 11l5 4 5-4"/><path d="M5 21h14"/></svg>
        Downloads
      </div>
      <div class="item" data-act="settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.4-2.3 1a7 7 0 0 0-1.7-1l-.3-2.6h-4l-.3 2.6a7 7 0 0 0-1.7 1l-2.3-1-2 3.4 2 1.5a7 7 0 0 0 0 2l-2 1.5 2 3.4 2.3-1a7 7 0 0 0 1.7 1l.3 2.6h4l.3-2.6a7 7 0 0 0 1.7-1l2.3 1 2-3.4-2-1.5a7 7 0 0 0 .1-1z"/></svg>
        Settings
      </div>
      <div class="item" data-act="accessibility">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="5" r="2"/><path d="M4 8h16"/><path d="M9 8l1 12"/><path d="M15 8l-1 12"/></svg>
        Accessibility
      </div>

      <!-- bottom circular icon row -->
      <div class="row">
        <button id="navBack" title="Back" aria-label="Back">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg>
        </button>
        <button id="navFwd" title="Forward" aria-label="Forward">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5l7 7-7 7"/></svg>
        </button>
        <button id="navReload" title="Reload" aria-label="Reload">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 11a8 8 0 1 0-1.5 5"/><path d="M20 4v6h-6"/></svg>
        </button>
        <button id="navBookmark" title="Bookmark" aria-label="Bookmark">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M12 3l2.9 5.9 6.5.9-4.7 4.6 1.1 6.5L12 18.8 6.2 21l1.1-6.5L2.6 9.8l6.5-.9z"/></svg>
        </button>
      </div>
    </div>

    <!-- ================= SUB PANELS ================= -->
    <!-- History -->
    <div class="screen panel" id="panel-history">
      <div class="phead">
        <h2>History</h2>
        <button class="act" id="clearHistory">Clear</button>
      </div>
      <div class="body" id="historyBody"></div>
    </div>
    <!-- Bookmarks -->
    <div class="screen panel" id="panel-bookmarks">
      <div class="phead">
        <h2>Bookmarks</h2>
      </div>
      <div class="body" id="bookmarksBody"></div>
    </div>
    <!-- Downloads -->
    <div class="screen panel" id="panel-downloads">
      <div class="phead">
        <h2>Downloads</h2>
      </div>
      <div class="body" id="downloadsBody"></div>
    </div>
    <!-- Settings -->
    <div class="screen panel" id="panel-settings">
      <div class="phead">
        <h2>Settings</h2>
      </div>
      <div class="body">
        <div class="empty">Settings — placeholder</div>
      </div>
    </div>
    <!-- Accessibility -->
    <div class="screen panel" id="panel-accessibility">
      <div class="phead">
        <h2>Accessibility</h2>
      </div>
      <div class="body">
        <div class="actrl">
          <div class="lbl">Text size</div>
          <div class="seg" id="segText">
            <button data-size="small">Small</button>
            <button data-size="default" class="on">Default</button>
            <button data-size="large">Large</button>
          </div>
          <div class="lbl">Display</div>
          <div class="toggle" id="tgHC"><span class="tl">High contrast</span><span class="sw"></span></div>
          <div class="toggle" id="tgBig"><span class="tl">Larger tap targets</span><span class="sw"></span></div>
        </div>
      </div>
    </div>

    <!-- On-screen system keyboard -->
    <div class="kbd" id="kbd">
      <div class="krow">
        <button class="key" data-k="q">q</button><button class="key" data-k="w">w</button><button class="key" data-k="e">e</button><button class="key" data-k="r">r</button><button class="key" data-k="t">t</button><button class="key" data-k="y">y</button><button class="key" data-k="u">u</button><button class="key" data-k="i">i</button><button class="key" data-k="o">o</button><button class="key" data-k="p">p</button>
      </div>
      <div class="krow">
        <button class="key" data-k="a">a</button><button class="key" data-k="s">s</button><button class="key" data-k="d">d</button><button class="key" data-k="f">f</button><button class="key" data-k="g">g</button><button class="key" data-k="h">h</button><button class="key" data-k="j">j</button><button class="key" data-k="k">k</button><button class="key" data-k="l">l</button>
      </div>
      <div class="krow">
        <button class="key shift" data-k="shift">⇧</button><button class="key" data-k="z">z</button><button class="key" data-k="x">x</button><button class="key" data-k="c">c</button><button class="key" data-k="v">v</button><button class="key" data-k="b">b</button><button class="key" data-k="n">n</button><button class="key" data-k="m">m</button><button class="key back" data-k="back">⌫</button>
      </div>
      <div class="krow">
        <button class="key sym" data-k="sym">?123</button><button class="key fn" data-k="fn">Fn</button><button class="key comma" data-k=",">,</button><button class="key space" data-k=" "></button><button class="key dot" data-k=".">.</button><button class="key enter" data-k="enter"><svg width="18" height="14" viewBox="0 0 18 14" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4.64063 13.6406L5.96046e-08 9L4.64063 4.35938V13.6406ZM3.21875 9.84375V8.15625H17.2656V9.84375H3.21875ZM15.625 9.84375V-4.76837e-07H17.3125V9.84375H15.625ZM11.0781 1.6875V-4.76837e-07H17.2656V1.6875H11.0781Z" fill="#DDDDDD"/></svg></button>
      </div>
    </div>

    <!-- Android-style edge back-swipe affordance -->
    <div class="backhint" id="backhint">
      <svg class="arrow" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg>
    </div>
  </div>

<script>
(function(){
  "use strict";

  // ---------- State ----------
  let uid = 0;
  const newId = () => 'tab' + (++uid);
  function makeTab(url, theme){
    const t = parsePage(url || '');
    return { id:newId(), title:t.title, url:t.url, kind:t.kind, theme: theme || 'dark', back:[], fwd:[] };
  }
  function parsePage(raw){
    const s = (raw||'').trim();
    if(!s) return { kind:'home', title:'New tab', url:'' };
    const looksUrl = /^[\w-]+(\.[\w-]+)+(\/\S*)?$/.test(s) || /^https?:\/\//i.test(s);
    if(looksUrl){
      let url = /^https?:\/\//i.test(s) ? s : 'https://' + s;
      let host = url.replace(/^https?:\/\//i,'').split('/')[0];
      return { kind:'site', title:host, url:url };
    }
    return { kind:'query', title:s, url:'search?q=' + encodeURIComponent(s) };
  }

  const state = {
    tabs: [ makeTab('comet.design', 'light'), makeTab('comet.design', 'dark') ],
    activeId: null,
    history: [],     // {title,url,kind}
    bookmarks: [],   // {title,url,kind}
    downloads: [
      { name:'report-q2.pdf', size:'2.4 MB' },
      { name:'wallpaper.png', size:'1.1 MB' }
    ]
  };
  state.activeId = state.tabs[0].id;

  // Pre-seed some navigation so the edge back/forward gesture is testable right away
  state.tabs[0].back = [
    { title:'foss.org',       url:'https://foss.org',       kind:'site' },
    { title:'monkeytype.com', url:'https://monkeytype.com', kind:'site' },
    { title:'comet.design/system', url:'https://comet.design/system', kind:'site' }
  ];
  state.history = [
    { title:'comet.design', url:'https://comet.design', kind:'site' },
    { title:'comet.design/system', url:'https://comet.design/system', kind:'site' },
    { title:'monkeytype.com', url:'https://monkeytype.com', kind:'site' },
    { title:'foss.org', url:'https://foss.org', kind:'site' }
  ];

  const active = () => state.tabs.find(t => t.id === state.activeId);

  // ---------- DOM ----------
  const frame = document.getElementById('frame');
  const pageEl = document.getElementById('page');
  const addrInput = document.getElementById('addrInput');

  // ---------- Render ----------
  function colorFor(str){
    let h = 0; for(let i=0;i<str.length;i++) h = (h*31 + str.charCodeAt(i)) % 360;
    const l = 16 + (h % 12);            // neutral gray, slight lightness variation
    return `hsl(0 0% ${l}%)`;
  }
  function initial(t){
    if(t.kind === 'home') return '·';
    if(t.kind === 'query') return '?';
    return (t.title[0]||'?').toUpperCase();
  }

  function homePage(){
    const sites = [
      { nm:'FOSS',       mark:'F',  go:'foss.org',        color:'#3aa564', txt:'#ffffff' },
      { nm:'Monkeytype', mark:'M',  go:'monkeytype.com',  color:'#e2b714', txt:'#1b1b1b' },
      { nm:'Heavypaint', mark:'HP', go:'heavypaint.app',  color:'#e0533d', txt:'#ffffff' },
    ];
    const tops = sites.map(s =>
      `<div class="top" data-go="${s.go}">`+
      `<div class="ico" style="background:${s.color};color:${s.txt}">${s.mark}</div>`+
      `<div class="nm">${s.nm}</div></div>`).join('');
    return `<div class="ddg"><div class="tops">${tops}</div></div>`;
  }
  function wireHome(){ /* links handled by delegation below */ }

  function renderPage(){
    const t = active();
    addrInput.value = t.url;
    pageEl.className = 'page' + (t.kind === 'site' && t.theme === 'light' ? ' light' : '');
    if(t.kind === 'home'){
      pageEl.innerHTML = homePage();
      wireHome();
    } else if(t.kind === 'query'){
      const q = t.title;
      let rows = '';
      for(let i=1;i<=5;i++){
        rows += `<div class="result"><div class="rt">${esc(q)} — result ${i}</div><div class="ru">example${i}.com/${encodeURIComponent(q)}</div></div>`;
      }
      pageEl.innerHTML = `<h1>Results for “${esc(q)}”</h1><div class="u">${esc(t.url)}</div>${rows}`;
    } else {
      pageEl.innerHTML = fakePage(t.title);
    }
    pageEl.scrollTop = 0;
    lastScroll = 0;
    showBar();
  }

  function fakePage(host){
    const name = host.split('.')[0];
    const Name = name.charAt(0).toUpperCase() + name.slice(1);
    const L = "Across handheld interfaces, the smallest gestures carry the most intent. A glance, a thumb-flick, a held breath before the page loads.";
    return `
    <div class="site">
      <div class="brandbar">
        <div class="logo">${esc(Name[0]||'?')}</div>
        <div class="name">${esc(Name)}</div>
        <div class="nav">Menu</div>
      </div>
      <h1>Designing for the thumb: a field guide to one-handed reading</h1>
      <div class="meta">${esc(host)} · 6 min read · Updated today</div>
      <div class="hero"></div>
      <p>${L} On a 540-by-620 canvas, every pixel is negotiated. See our notes on <a data-go="comet.design/gestures">gesture navigation</a> and the wider <a data-go="comet.design/system">design system</a>.</p>
      <p>Scroll down and the bottom bar slips away, giving the content the full height it deserves. Nudge back up — even a little — and the controls return, ready for the next tap.</p>
      <h2>Why the bar hides</h2>
      <p>${L} Reading is a forward motion; the interface should get out of the way of it. Related reading on <a data-go="monkeytype.com">Monkeytype</a> and <a data-go="heavypaint.app">Heavypaint</a>.</p>
      <div class="imgrow"><div class="cell"></div><div class="cell"></div></div>
      <p>The threshold is deliberately asymmetric: it takes a committed downward scroll to hide the bar, but the faintest upward flick to bring it home. More in the <a data-go="foss.org">FOSS handbook</a>.</p>
      <blockquote>“The best chrome is the chrome you only see when you reach for it.”</blockquote>
      <h2>Three principles</h2>
      <ul>
        <li><a data-go="comet.design/content-first">Content first</a> — the page owns the screen, the chrome borrows it.</li>
        <li><a data-go="comet.design/predictable">Predictable return</a> — up always means show, every time.</li>
        <li><a data-go="comet.design/motion">No surprises</a> — motion is quick, eased, and never janky.</li>
      </ul>
      <p>${L} These ideas are old, but on a touch handheld with a keyboard extension they feel new again — part phone, part tiny laptop, fully in the hand.</p>
      <h2>Keep reading</h2>
      <div class="linklist">
        <a data-go="comet.design/edge-gestures">→ Edge gestures, end to end</a>
        <a data-go="comet.design/keyboard">→ The pop-up keyboard</a>
        <a data-go="comet.design/tabs">→ Tabs and the switcher</a>
      </div>
      <p>${L} Tap any link above to move forward, then swipe in from either edge to go back.</p>
      <div class="foot">© ${new Date().getFullYear()} ${esc(Name)} · This is a mock page for prototype purposes.</div>
    </div>`;
  }

  function renderTabCount(){
    document.getElementById('tabCount').textContent = state.tabs.length;
  }

  function renderTabGrid(){
    const grid = document.getElementById('tabGrid');
    grid.innerHTML = '';
    state.tabs.forEach(t => {
      const card = document.createElement('div');
      card.className = 'tabcard' + (t.id === state.activeId ? ' active' : '');
      card.innerHTML =
        `<div class="prev" style="background:${colorFor(t.title)}">${esc(initial(t))}</div>`+
        `<div class="meta"><span>${esc(t.title)}</span><button class="x" data-close-tab="${t.id}">×</button></div>`;
      card.addEventListener('click', (e) => {
        if(e.target.closest('[data-close-tab]')) return;
        state.activeId = t.id;
        renderAll();
        closeSheet();
      });
      grid.appendChild(card);
    });
    const add = document.createElement('button');
    add.className = 'newtab';
    add.textContent = '+';
    add.addEventListener('click', () => { newTab(); closeSheet(); });
    grid.appendChild(add);

    grid.querySelectorAll('[data-close-tab]').forEach(btn => {
      btn.addEventListener('click', (e) => { e.stopPropagation(); closeTab(btn.getAttribute('data-close-tab')); });
    });
  }

  function renderHistory(){
    const body = document.getElementById('historyBody');
    if(!state.history.length){ body.innerHTML = '<div class="empty">No history yet</div>'; return; }
    body.innerHTML = '';
    state.history.forEach(h => {
      const row = listRow(h.title, h.url, () => { navigateActive(h.url || h.title); closePanels(); closeMenu(); });
      body.appendChild(row);
    });
  }
  function renderBookmarks(){
    const body = document.getElementById('bookmarksBody');
    body.innerHTML = '';

    // "Add current page" lives in the list itself now
    const t = active();
    const saved = t.kind !== 'home' && state.bookmarks.some(b => b.url === t.url);
    const addRow = document.createElement('div');
    addRow.className = 'listrow';
    addRow.innerHTML =
      `<div class="ico">${saved ? '✓' : '+'}</div>`+
      `<div class="txt"><div class="t">${saved ? 'Saved to bookmarks' : 'Add current page'}</div>`+
      `<div class="s">${esc(t.kind === 'home' ? 'Open a page first' : (t.title || ''))}</div></div>`;
    addRow.addEventListener('click', () => {
      if(t.kind === 'home') return;
      if(!saved) state.bookmarks.unshift({ title:t.title, url:t.url, kind:t.kind });
      updateNavButtons(); renderBookmarks();
    });
    body.appendChild(addRow);

    if(!state.bookmarks.length){
      const e = document.createElement('div');
      e.className = 'empty'; e.textContent = 'No bookmarks yet';
      body.appendChild(e);
      return;
    }
    state.bookmarks.forEach((b,i) => {
      const row = listRow(b.title, b.url, () => { navigateActive(b.url || b.title); closePanels(); closeMenu(); });
      const rm = document.createElement('button'); rm.className='rm'; rm.textContent='×';
      rm.addEventListener('click', (e)=>{ e.stopPropagation(); state.bookmarks.splice(i,1); renderBookmarks(); });
      row.appendChild(rm);
      body.appendChild(row);
    });
  }
  function renderDownloads(){
    const body = document.getElementById('downloadsBody');
    if(!state.downloads.length){ body.innerHTML = '<div class="empty">No downloads</div>'; return; }
    body.innerHTML = '';
    state.downloads.forEach(d => body.appendChild(listRow(d.name, d.size, null, '↓')));
  }

  function listRow(title, sub, onClick, icoChar){
    const row = document.createElement('div');
    row.className = 'listrow';
    row.innerHTML = `<div class="ico">${esc(icoChar || (title[0]||'?').toUpperCase())}</div>`+
      `<div class="txt"><div class="t">${esc(title)}</div><div class="s">${esc(sub||'')}</div></div>`;
    if(onClick) row.addEventListener('click', onClick);
    return row;
  }

  function renderAll(){
    renderPage(); renderTabCount(); renderTabGrid();
    updateNavButtons();
  }
  function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  // ---------- Navigation ----------
  function navigateActive(raw){
    const t = active();
    const p = parsePage(raw);
    if(t.kind !== 'home' && (t.url || t.title)){
      t.back.push({ title:t.title, url:t.url, kind:t.kind });
    }
    t.fwd = [];
    t.title = p.title; t.url = p.url; t.kind = p.kind;
    if(p.kind !== 'home'){
      state.history = state.history.filter(h => h.url !== p.url);
      state.history.unshift({ title:p.title, url:p.url, kind:p.kind });
    }
    renderAll();
  }
  function goBack(){
    const t = active();
    if(!t.back.length) return;
    t.fwd.push({ title:t.title, url:t.url, kind:t.kind });
    const p = t.back.pop();
    t.title=p.title; t.url=p.url; t.kind=p.kind;
    renderAll();
  }
  function goFwd(){
    const t = active();
    if(!t.fwd.length) return;
    t.back.push({ title:t.title, url:t.url, kind:t.kind });
    const p = t.fwd.pop();
    t.title=p.title; t.url=p.url; t.kind=p.kind;
    renderAll();
  }
  function updateNavButtons(){
    const t = active();
    document.getElementById('navBack').disabled = !t.back.length;
    document.getElementById('navFwd').disabled = !t.fwd.length;
    const isBm = state.bookmarks.some(b => b.url === t.url && t.kind !== 'home');
    document.getElementById('navBookmark').classList.toggle('on', isBm);
  }

  function newTab(){
    const t = makeTab('');
    state.tabs.push(t);
    state.activeId = t.id;
    renderAll();
    addrInput.focus();
  }
  function closeTab(id){
    const idx = state.tabs.findIndex(t => t.id === id);
    if(idx === -1) return;
    state.tabs.splice(idx,1);
    if(!state.tabs.length){ state.tabs.push(makeTab('')); }
    if(id === state.activeId){
      state.activeId = state.tabs[Math.max(0, idx-1)].id;
    }
    renderAll();
  }
  function toggleBookmarkCurrent(){
    const t = active();
    if(t.kind === 'home') return;
    const i = state.bookmarks.findIndex(b => b.url === t.url);
    if(i >= 0) state.bookmarks.splice(i,1);
    else state.bookmarks.unshift({ title:t.title, url:t.url, kind:t.kind });
    updateNavButtons(); renderBookmarks();
  }

  // ---------- Screen controls ----------
  const sheet = document.getElementById('tabsSheet');
  const scrim = document.getElementById('scrim');
  const menu = document.getElementById('menu');

  function openSheet(){ renderTabGrid(); sheet.classList.add('open'); }
  function closeSheet(){ sheet.classList.remove('open'); }
  function openMenu(){ scrim.classList.add('open'); menu.classList.add('open'); updateNavButtons(); }
  function closeMenu(){ scrim.classList.remove('open'); menu.classList.remove('open'); }
  function openPanel(name){
    const p = document.getElementById('panel-'+name);
    if(name==='history') renderHistory();
    if(name==='bookmarks') renderBookmarks();
    if(name==='downloads') renderDownloads();
    p.classList.add('open');
  }
  function closePanels(){ document.querySelectorAll('.panel').forEach(p => p.classList.remove('open')); }

  // ---------- Events ----------
  document.getElementById('addrForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const v = addrInput.value.trim();
    if(v) navigateActive(v);
    addrInput.blur();
  });
  addrInput.addEventListener('focus', () => addrInput.select());

  // Clear (X) inside the address bar — keeps focus + keyboard open
  (function(){
    const clr = document.getElementById('addrClear');
    clr.addEventListener('pointerdown', (e) => e.preventDefault());   // don't blur the input
    clr.addEventListener('click', () => {
      addrInput.value = '';
      addrInput.dispatchEvent(new Event('input'));
      addrInput.focus();
    });
  })();

  document.getElementById('plusBtn').addEventListener('click', newTab);
  document.getElementById('tabsBtn').addEventListener('click', openSheet);
  document.getElementById('menuBtn').addEventListener('click', openMenu);
  scrim.addEventListener('click', closeMenu);

  // menu list items
  menu.querySelectorAll('.item').forEach(it => {
    it.addEventListener('click', () => {
      const act = it.getAttribute('data-act');
      if(act === 'newtab'){ closeMenu(); newTab(); return; }
      closeMenu();
      openPanel(act);
    });
  });
  // menu bottom row
  document.getElementById('navBack').addEventListener('click', () => { goBack(); });
  document.getElementById('navFwd').addEventListener('click', () => { goFwd(); });
  document.getElementById('navReload').addEventListener('click', () => { renderPage(); });
  document.getElementById('navBookmark').addEventListener('click', () => { toggleBookmarkCurrent(); });

  // System back. Unwinds whatever layer is open: panel → menu → tabs sheet → page back.
  function systemBack(){
    if(document.querySelector('.panel.open')){ closePanels(); return; }
    if(menu.classList.contains('open')){ closeMenu(); return; }
    if(sheet.classList.contains('open')){ closeSheet(); return; }
    goBack();
  }

  // ---------- Android-style edge back-swipe gesture (left OR right edge) ----------
  // Rules modelled on Android gesture nav: inward swipe starting within the edge
  // activation zone; a Material "bubble" with a back arrow peeks in and follows the
  // finger; releasing past ~35% progress commits, otherwise it snaps back.
  (function(){
    const EDGE = 24;          // activation zone from each side (~20-24dp)
    const COMMIT = 84;        // inward distance to commit (~35% of the gesture travel)
    const hint = document.getElementById('backhint');
    let st = null;            // {side, startX, pointerId, inward, gesturing}

    function frameRect(){ return frame.getBoundingClientRect(); }

    function down(e){
      if(st) return;
      const r = frameRect();
      const x = e.clientX - r.left, y = e.clientY - r.top;
      let side = null;
      if(x <= EDGE) side = 'left';
      else if(x >= r.width - EDGE) side = 'right';
      if(!side) return;
      st = { side, startX: x, startY: y, pid: e.pointerId, inward: 0, gesturing: false, pending: true };
    }

    function move(e){
      if(!st) return;
      const r = frameRect();
      const x = e.clientX - r.left, y = e.clientY - r.top;
      const dx = x - st.startX, dy = y - st.startY;
      const inward = st.side === 'left' ? dx : -dx;

      if(st.pending){
        if(Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 5){ st = null; return; } // vertical → let it scroll
        if(inward > 5 && Math.abs(dx) > Math.abs(dy)){
          st.pending = false; st.gesturing = true;
          try { frame.setPointerCapture(st.pid); } catch(_){}
          hint.className = 'backhint' + (st.side === 'right' ? ' right' : '');
        } else return;
      }

      e.preventDefault();
      st.inward = Math.max(0, inward);
      const reveal = Math.min(st.inward * 0.62, 54);
      if(st.side === 'left') hint.style.left = (-44 + reveal) + 'px';
      else                   hint.style.right = (-44 + reveal) + 'px';
      hint.style.top = Math.max(8, Math.min(r.height - 66, y - 29)) + 'px';
      hint.style.opacity = Math.min(1, st.inward / 22);
      hint.classList.toggle('committed', st.inward >= COMMIT);
    }

    function up(){
      if(!st){ return; }
      const commit = st.gesturing && st.inward >= COMMIT;
      try { frame.releasePointerCapture(st.pid); } catch(_){}
      hint.style.opacity = '0';
      hint.style.left = ''; hint.style.right = '';
      hint.classList.remove('committed');
      const wasGesture = st.gesturing;
      st = null;
      if(commit) systemBack();
      return wasGesture;
    }

    frame.addEventListener('pointerdown', down, true);
    frame.addEventListener('pointermove', move, true);
    frame.addEventListener('pointerup', up, true);
    frame.addEventListener('pointercancel', up, true);
  })();

  // ---------- On-screen keyboard ----------
  (function(){
    const kbd = document.getElementById('kbd');
    let kbInput = null, shiftOn = false;
    const updateShift = () => kbd.classList.toggle('shift-on', shiftOn);

    function openKb(input){ kbInput = input; frame.classList.add('kbd-open'); }
    function closeKb(){ frame.classList.remove('kbd-open'); kbInput = null; shiftOn = false; updateShift(); }

    // open when any input gains focus, close when focus leaves all inputs
    frame.addEventListener('focusin', (e) => { if(e.target.tagName === 'INPUT') openKb(e.target); });
    frame.addEventListener('focusout', (e) => {
      if(e.target.tagName !== 'INPUT') return;
      setTimeout(() => { if(!(document.activeElement && document.activeElement.tagName === 'INPUT')) closeKb(); }, 0);
    });

    function insert(inp, t){
      const s = inp.selectionStart ?? inp.value.length, e = inp.selectionEnd ?? inp.value.length;
      inp.value = inp.value.slice(0,s) + t + inp.value.slice(e);
      const p = s + t.length;
      try { inp.setSelectionRange(p,p); } catch(_){}
      inp.dispatchEvent(new Event('input'));
    }
    function del(inp){
      const s = inp.selectionStart ?? inp.value.length, e = inp.selectionEnd ?? inp.value.length;
      if(s !== e){ inp.value = inp.value.slice(0,s) + inp.value.slice(e); try{inp.setSelectionRange(s,s);}catch(_){} }
      else if(s > 0){ inp.value = inp.value.slice(0,s-1) + inp.value.slice(s); try{inp.setSelectionRange(s-1,s-1);}catch(_){} }
    }

    // keep the focused input focused while tapping keys
    kbd.addEventListener('pointerdown', (e) => { if(e.target.closest('.key')) e.preventDefault(); });
    kbd.addEventListener('click', (e) => {
      const k = e.target.closest('.key'); if(!k || !kbInput) return;
      const v = k.getAttribute('data-k');
      if(v === 'shift'){ shiftOn = !shiftOn; updateShift(); return; }
      if(v === 'sym' || v === 'fn'){ return; }            // visual only
      if(v === 'back'){ del(kbInput); return; }
      if(v === 'enter'){
        const f = kbInput.form;
        if(f){ if(f.requestSubmit) f.requestSubmit(); else f.dispatchEvent(new Event('submit', {cancelable:true})); }
        kbInput.blur(); closeKb(); return;
      }
      let ch = (v === ' ') ? ' ' : v;
      if(shiftOn && ch.length === 1) ch = ch.toUpperCase();
      insert(kbInput, ch);
      if(shiftOn){ shiftOn = false; updateShift(); }
    });
  })();

  // history actions
  document.getElementById('clearHistory').addEventListener('click', () => { state.history = []; renderHistory(); });

  // accessibility
  document.getElementById('segText').addEventListener('click', (e) => {
    const b = e.target.closest('[data-size]'); if(!b) return;
    document.querySelectorAll('#segText button').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    const map = { small:'14px', default:'16px', large:'19px' };
    frame.style.setProperty('--page-font', map[b.getAttribute('data-size')]);
  });
  document.getElementById('tgHC').addEventListener('click', function(){ this.classList.toggle('on'); frame.classList.toggle('hc', this.classList.contains('on')); });
  document.getElementById('tgBig').addEventListener('click', function(){ this.classList.toggle('on'); frame.classList.toggle('big', this.classList.contains('on')); });

  // ---------- Tabs sheet drag-to-dismiss (Pointer Events only) ----------
  const grab = document.getElementById('tabsGrab');
  let dragging = false, startY = 0, dy = 0;
  grab.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    dragging = true; startY = e.clientY; dy = 0;
    sheet.style.transition = 'none';
    grab.setPointerCapture(e.pointerId);
  });
  grab.addEventListener('pointermove', (e) => {
    if(!dragging) return;
    dy = Math.max(0, e.clientY - startY);
    sheet.style.transform = 'translateY(' + dy + 'px)';
  });
  function endDrag(){
    if(!dragging) return;
    dragging = false;
    sheet.style.transition = '';
    sheet.style.transform = '';
    if(dy > 120) closeSheet();
  }
  grab.addEventListener('pointerup', endDrag);
  grab.addEventListener('pointercancel', endDrag);

  // Pull down on the tab list while it's scrolled to the top → dismiss the sheet too
  (function(){
    const grid = document.getElementById('tabGrid');
    let sy = 0, pulling = false, pdy = 0, pid = null;
    grid.addEventListener('pointerdown', (e) => { sy = e.clientY; pulling = false; pdy = 0; pid = e.pointerId; });
    grid.addEventListener('pointermove', (e) => {
      if(pid === null) return;
      const d = e.clientY - sy;
      if(!pulling){
        if(grid.scrollTop <= 0 && d > 6){ pulling = true; sheet.style.transition = 'none'; try { grid.setPointerCapture(pid); } catch(_){} }
        else return;
      }
      pdy = Math.max(0, d);
      e.preventDefault();
      sheet.style.transform = 'translateY(' + pdy + 'px)';
    });
    function end(){
      if(pid === null) return;
      const was = pulling, d = pdy;
      try { grid.releasePointerCapture(pid); } catch(_){}
      pid = null; pulling = false; pdy = 0;
      if(was){ sheet.style.transition = ''; sheet.style.transform = ''; if(d > 120) closeSheet(); }
    }
    grid.addEventListener('pointerup', end);
    grid.addEventListener('pointercancel', end);
  })();

  // ---------- Hide bottom bar on scroll-down, reveal on scroll-up ----------
  const bottombar = document.querySelector('.bottombar');
  let lastScroll = 0;
  function showBar(){ bottombar.classList.remove('hidden'); }
  function hideBar(){
    // never hide while the address field is focused
    if(document.activeElement === addrInput) return;
    bottombar.classList.add('hidden');
  }
  pageEl.addEventListener('scroll', () => {
    const y = pageEl.scrollTop;
    if(y <= 4){ showBar(); lastScroll = y; return; }       // at top → always shown
    const dy = y - lastScroll;
    if(dy > 6 && y > 60) hideBar();                          // committed scroll down → hide
    else if(dy < -2) showBar();                             // the slightest scroll up → show
    lastScroll = y;
  }, { passive: true });

  // ---------- Mouse drag-to-scroll (touch uses native momentum) ----------
  function dragScroll(el){
    let down = false, capturing = false, startY = 0, startTop = 0, moved = false, pid = null;
    el.addEventListener('pointerdown', (e) => {
      if(e.pointerType !== 'mouse') return;        // leave touch to native scroll
      down = true; capturing = false; moved = false;
      startY = e.clientY; startTop = el.scrollTop; pid = e.pointerId;
      // NOTE: don't capture yet — capturing on pointerdown would steal clicks
      // from child buttons/cards. Only capture once a real drag begins.
    });
    el.addEventListener('pointermove', (e) => {
      if(!down) return;
      const dy = e.clientY - startY;
      if(!capturing){
        if(Math.abs(dy) <= 4) return;              // still a click, not a drag
        capturing = true; moved = true;
        el.setPointerCapture(pid);
        el.style.cursor = 'grabbing';
      }
      el.scrollTop = startTop - dy;
    });
    function up(){
      if(!down) return;
      down = false;
      if(capturing){ try { el.releasePointerCapture(pid); } catch(_){} }
      capturing = false; el.style.cursor = '';
    }
    el.addEventListener('pointerup', up);
    el.addEventListener('pointercancel', up);
    // swallow only the click that follows an actual drag
    el.addEventListener('click', (e) => {
      if(moved){ e.stopPropagation(); e.preventDefault(); moved = false; }
    }, true);
  }
  document.querySelectorAll('.page, .tabgrid, .body').forEach(dragScroll);

  // In-page hyperlinks (home top sites + article links) → navigate the active tab
  pageEl.addEventListener('click', (e) => {
    const a = e.target.closest('[data-go]');
    if(a){ e.preventDefault(); navigateActive(a.getAttribute('data-go')); }
  });

  // ---------- Init ----------
  renderAll();
})();
</script>
</body>
</html>
